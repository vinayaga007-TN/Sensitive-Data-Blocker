<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DataShield Pro</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0D0D0D;--card:#1A1A1A;--border:#2E2E2E;
      --green:#00C853;--yellow:#FFB300;--red:#FF3B30;
      --text:#F5F5F5;--text2:#999;--text3:#555;
    }
    body{width:400px;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px}

    /* Header */
    .hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
    .hdr-logo{width:26px;height:26px;flex-shrink:0}
    .hdr-title{font-size:15px;font-weight:700;flex:1}
    .toggle{position:relative;width:44px;height:26px;cursor:pointer;flex-shrink:0}
    .toggle-track{position:absolute;inset:0;background:#333;border-radius:13px;transition:background .2s}
    .toggle-track.on{background:var(--green)}
    .toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
    .toggle-thumb.on{transform:translateX(18px)}
    .hdr-right{display:flex;flex-direction:column;align-items:center;gap:4px}
    .status{font-size:10px;color:var(--text2);white-space:nowrap}
    .status.on{color:var(--green)}

    /* Site Security Card */
    .security-card{margin:12px 12px 4px;border-radius:12px;overflow:hidden;border:2px solid var(--border)}
    .security-card.safe   {border-color:rgba(0,200,83,.4);background:linear-gradient(135deg,#0A1F12,#0D0D0D)}
    .security-card.caution{border-color:rgba(255,179,0,.4);background:linear-gradient(135deg,#1F1600,#0D0D0D)}
    .security-card.danger {border-color:rgba(255,59,48,.5); background:linear-gradient(135deg,#1F0505,#0D0D0D)}
    .security-card.unknown{border-color:var(--border);background:var(--card)}

    .sec-header{display:flex;align-items:center;gap:10px;padding:12px 14px}
    .sec-icon{font-size:26px;line-height:1;flex-shrink:0}
    .sec-info{flex:1;min-width:0}
    .sec-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sec-title.safe   {color:var(--green)}
    .sec-title.caution{color:var(--yellow)}
    .sec-title.danger {color:var(--red)}
    .sec-title.unknown{color:var(--text2)}
    .sec-domain{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
    .sec-score{font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;flex-shrink:0}
    .sec-score.safe   {background:rgba(0,200,83,.15);color:var(--green)}
    .sec-score.caution{background:rgba(255,179,0,.15);color:var(--yellow)}
    .sec-score.danger {background:rgba(255,59,48,.2);color:var(--red)}
    .sec-score.unknown{background:var(--border);color:var(--text2)}

    .attack-tag{
      margin:0 14px 10px;display:inline-flex;align-items:center;gap:5px;
      padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
    }
    .attack-tag.phishing {background:rgba(255,59,48,.2);border:1px solid rgba(255,59,48,.5);color:#FF8080}
    .attack-tag.spoofing  {background:rgba(255,59,48,.2);border:1px solid rgba(255,59,48,.5);color:#FF8080}
    .attack-tag.suspicious{background:rgba(255,179,0,.15);border:1px solid rgba(255,179,0,.4);color:#FFB300}

    .sec-reasons{padding:0 14px 12px}
    .sec-reason{font-size:11px;color:var(--text2);line-height:1.7;display:block}
    .sec-reason:first-child{color:#ccc}

    .sec-brand-warn{
      margin:0 14px 10px;padding:8px 12px;border-radius:8px;
      background:rgba(255,59,48,.12);border:1px solid rgba(255,59,48,.3);
      font-size:12px;font-weight:600;color:#FF8080;
    }

    /* Stats */
    .stats{display:flex;margin:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px}
    .stat{flex:1;text-align:center;padding:12px 10px}
    .stat+.stat{border-left:1px solid var(--border)}
    .stat-num{font-size:28px;font-weight:800;color:var(--green);line-height:1}
    .stat-lbl{font-size:11px;color:var(--text2);margin-top:4px}

    /* Section */
    .sec-title-bar{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:4px 16px 6px}

    /* Sites */
    .sites{margin:0 12px 8px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .site-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
    .site-row:last-child{border-bottom:none}
    .site-info{flex:1;min-width:0}
    .site-name{font-size:13px;font-weight:500}
    .site-dom{font-size:10px;color:var(--text2)}
    .stoggle{width:36px;height:22px}
    .stoggle .toggle-thumb{width:16px;height:16px;top:3px;left:3px}
    .stoggle .toggle-thumb.on{transform:translateX(14px)}

    /* Categories */
    .cats{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 10px}
    .cat{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;outline:none}
    .cat:hover{border-color:#555;color:var(--text)}
    .cat.on{background:rgba(0,200,83,.1);border-color:var(--green);color:var(--green)}

    /* Footer */
    .ftr{border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
    .ftr-btn{background:none;border:none;color:var(--green);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:0}
    .ftr-btn:hover{text-decoration:underline}
    .ftr-note{font-size:10px;color:var(--text3);text-align:right;max-width:180px;line-height:1.3}
    .ver{font-size:10px;color:var(--text3);text-align:center;padding:0 16px 8px}

    /* Loading pulse */
    @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
    .loading{animation:pulse 1.2s ease infinite;color:var(--text3)!important}
  </style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <svg class="hdr-logo" viewBox="0 0 24 24" fill="none">
    <path d="M12 2L4 5.5V11C4 15.418 7.582 20.417 12 22C16.418 20.417 20 15.418 20 11V5.5L12 2Z" fill="#8B0000" stroke="#FF3B30" stroke-width="1.5"/>
    <rect x="9" y="10" width="6" height="5" rx="1" fill="#FF6B6B"/>
    <path d="M10 10V8.5C10 7.67 10.67 7 11.5 7H12.5C13.33 7 14 7.67 14 8.5V10" stroke="#FF6B6B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </svg>
  <span class="hdr-title">DataShield Pro</span>
  <div class="hdr-right">
    <div class="toggle" id="masterToggle" role="switch" tabindex="0" title="Enable/disable protection">
      <div class="toggle-track" id="masterTrack"></div>
      <div class="toggle-thumb" id="masterThumb"></div>
    </div>
    <span class="status" id="statusLabel">Loading...</span>
  </div>
</div>

<!-- Current Site Security -->
<div class="security-card unknown" id="secCard">
  <div class="sec-header">
    <div class="sec-icon" id="secIcon">🔍</div>
    <div class="sec-info">
      <div class="sec-title unknown loading" id="secTitle">Analyzing current site...</div>
      <div class="sec-domain" id="secDomain">—</div>
    </div>
    <div class="sec-score unknown" id="secScore">—</div>
  </div>
  <div id="secBrandWarn" style="display:none"></div>
  <div id="secAttackTag" style="display:none"></div>
  <div class="sec-reasons" id="secReasons"></div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat"><div class="stat-num" id="statToday">—</div><div class="stat-lbl">Blocked Today</div></div>
  <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Total Blocked</div></div>
</div>

<!-- Sites -->
<div class="sec-title-bar">Protected Sites</div>
<div class="sites" id="sitesList"></div>

<!-- Categories -->
<div class="sec-title-bar">Detection Categories</div>
<div class="cats" id="catGrid"></div>

<!-- Footer -->
<div class="ftr">
  <button class="ftr-btn" id="optBtn">⚙️ Options</button>
  <div class="ftr-note">🔒 100% Local — No data leaves your device</div>
</div>
<div class="ver" id="ver">v1.2.0</div>

<script src="storage.js"></script>
<script src="site-checker.js"></script>
<script src="popup.js"></script>
</body>
</html>
