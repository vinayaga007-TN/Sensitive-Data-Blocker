<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DataShield Pro</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0D0D0D;--card:#1A1A1A;--border:#2E2E2E;
      --green:#00C853;--red:#FF3B30;--text:#F5F5F5;
      --text2:#999;--text3:#555;
    }
    body{width:380px;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px}

    /* Header */
    .hdr{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
    .hdr-logo{width:26px;height:26px;flex-shrink:0}
    .hdr-title{font-size:15px;font-weight:700;flex:1}

    /* Toggle switch — JS-driven, no CSS selector tricks */
    .toggle{position:relative;width:44px;height:26px;cursor:pointer;flex-shrink:0}
    .toggle-track{position:absolute;inset:0;background:#333;border-radius:13px;transition:background .2s}
    .toggle-track.on{background:var(--green)}
    .toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
    .toggle-thumb.on{transform:translateX(18px)}

    .hdr-right{display:flex;flex-direction:column;align-items:center;gap:4px}
    .status{font-size:10px;color:var(--text2);white-space:nowrap}
    .status.on{color:var(--green)}

    /* Stats */
    .stats{display:flex;margin:12px;background:var(--card);border:1px solid var(--border);border-radius:10px}
    .stat{flex:1;text-align:center;padding:14px 10px}
    .stat+.stat{border-left:1px solid var(--border)}
    .stat-num{font-size:30px;font-weight:800;color:var(--green);line-height:1}
    .stat-lbl{font-size:11px;color:var(--text2);margin-top:4px}

    /* Section title */
    .sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);padding:2px 16px 6px}

    /* Sites */
    .sites{margin:0 12px 10px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .site-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border)}
    .site-row:last-child{border-bottom:none}
    .site-info{flex:1;min-width:0}
    .site-name{font-size:13px;font-weight:500}
    .site-dom{font-size:10px;color:var(--text2)}
    /* Smaller site toggle */
    .stoggle{width:36px;height:22px}
    .stoggle .toggle-thumb{width:16px;height:16px;top:3px;left:3px}
    .stoggle .toggle-thumb.on{transform:translateX(14px)}

    /* Category pills */
    .cats{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 12px}
    .cat{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;outline:none}
    .cat:hover{border-color:#555;color:var(--text)}
    .cat.on{background:rgba(0,200,83,.12);border-color:var(--green);color:var(--green)}

    /* Footer */
    .ftr{border-top:1px solid var(--border);padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
    .ftr-btn{background:none;border:none;color:var(--green);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;padding:0}
    .ftr-btn:hover{text-decoration:underline}
    .ftr-note{font-size:10px;color:var(--text3);text-align:right;max-width:180px;line-height:1.3}
    .ver{font-size:10px;color:var(--text3);text-align:center;padding:0 16px 10px}
  </style>
</head>
<body>

<!-- Header -->
<div class="hdr">
  <svg class="hdr-logo" viewBox="0 0 24 24" fill="none">
    <path d="M12 2L4 5.5V11C4 15.418 7.582 20.417 12 22C16.418 20.417 20 15.418 20 11V5.5L12 2Z" fill="#8B0000" stroke="#FF3B30" stroke-width="1.5"/>
    <rect x="9" y="10" width="6" height="5" rx="1" fill="#FF6B6B"/>
    <path d="M10 10V8.5C10 7.67 10.67 7 11.5 7H12.5C13.33 7 14 7.67 14 8.5V10" stroke="#FF6B6B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </svg>
  <span class="hdr-title">DataShield Pro</span>
  <div class="hdr-right">
    <div class="toggle" id="masterToggle" title="Enable/disable protection" role="switch" tabindex="0">
      <div class="toggle-track" id="masterTrack"></div>
      <div class="toggle-thumb" id="masterThumb"></div>
    </div>
    <span class="status" id="statusLabel">Loading...</span>
  </div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat"><div class="stat-num" id="statToday">—</div><div class="stat-lbl">Blocked Today</div></div>
  <div class="stat"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Total Blocked</div></div>
</div>

<!-- Sites -->
<div class="sec-title">Protected Sites</div>
<div class="sites" id="sitesList"></div>

<!-- Categories -->
<div class="sec-title">Detection Categories</div>
<div class="cats" id="catGrid"></div>

<!-- Footer -->
<div class="ftr">
  <button class="ftr-btn" id="optBtn">⚙️ Options</button>
  <div class="ftr-note">🔒 100% Local — No data leaves your device</div>
</div>
<div class="ver" id="ver">v1.0.0</div>

<script src="storage.js"></script>
<script src="popup.js"></script>
</body>
</html>
